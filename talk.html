<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retropixel Talk™</title>

<link rel="icon" href="assets/icons/Talk_icon.png">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/talk.css">

</head>
<body>

<!-- LOGIN -->

<div id="loginScreen" class="login-screen">

    <div class="login-box">

    <img src="assets/icons/Talk_icon.png" class="login-logo">

    <h1>Retropixel Talk™</h1>

    <p>Conecte-se aos seus contatos</p>

    <input
        type="text"
        id="username"
        placeholder="Nome de usuário">

    <input
        type="email"
        id="email"
        placeholder="E-mail">

    <input
        type="password"
        id="password"
        placeholder="Senha">

    <div class="login-buttons">

        <button onclick="login()">
            Entrar
        </button>

        <button onclick="registerUser()">
            Registrar
        </button>

    </div>

</div>

<!-- APP -->

<div id="talkApp" class="talk-app hidden">

    <header class="talk-top">

        <div class="talk-brand">

            <img src="assets/icons/Talk_icon.png">

            <div>

                <h1>Retropixel Talk™</h1>

                <span id="myStatus">
                    🟢 Online
                </span>

            </div>

        </div>

        <div class="top-actions">

            <select id="statusSelect">

                <option value="online">
                    🟢 Online
                </option>

                <option value="ocupado">
                    🔴 Ocupado
                </option>

                <option value="curtindo">
                    🟠 Curtindo
                </option>

                <option value="offline">
                    ⚫ Offline
                </option>

            </select>

            <button onclick="logout()">
                Sair
            </button>

        </div>

    </header>

    <div class="talk-container">

        <!-- CONTATOS -->

        <aside class="contacts-panel">

            <div class="contacts-header">

                <h3>Contatos</h3>

                <button onclick="createGroup()">
                    ➕ Grupo
                </button>

            </div>

            <input
                type="text"
                id="searchUser"
                placeholder="Buscar contato...">

            <div id="usersList"></div>

        </aside>

        <!-- CHAT -->

        <main class="chat-panel">

            <div id="chatHeader" class="chat-header">

                Selecione um contato

            </div>

            <div id="messages" class="messages">

            </div>

            <div class="message-box">

                <input
                    type="text"
                    id="messageInput"
                    placeholder="Digite sua mensagem...">

                <button onclick="sendMessage()">
                    Enviar
                </button>

            </div>

        </main>

    </div>

</div>

<script type="module" src="js/talk.js"></script>

</body>
</html>
