<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retropixel Write™</title>

<link rel="icon" href="assets/icons/Write_icon.png">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/write.css">

</head>

<body>

<header class="write-top">

    <div class="write-logo">

        <img src="assets/icons/Write_icon.png" alt="Write">

        <div>

            <h1>Retropixel Write™</h1>

            <p>Editor de documentos</p>

        </div>

    </div>

    <button
        class="home-btn"
        onclick="location.href='index.html'">

        🏠 Início

    </button>

</header>

<section class="ribbon">

    <div class="group">

        <button onclick="newDocument()">

            📄 Novo

        </button>

        <button onclick="saveDocument()">

            💾 TXT

        </button>

        <button onclick="saveHTML()">

            🌐 HTML

        </button>

        <button onclick="addPage()">

            ➕ Página

        </button>

    </div>

    <div class="group">

        <select
            id="fontName"
            onchange="changeFont()">

            <option value="Arial">
                Arial
            </option>

            <option value="Verdana">
                Verdana
            </option>

            <option value="Tahoma">
                Tahoma
            </option>

            <option value="Trebuchet MS">
                Trebuchet MS
            </option>

            <option value="Georgia">
                Georgia
            </option>

            <option value="Times New Roman">
                Times New Roman
            </option>

            <option value="Courier New">
                Courier New
            </option>

            <option value="Segoe UI">
                Segoe UI
            </option>

        </select>

        <select
            id="fontSize"
            onchange="changeSize()">

            <option value="8">8</option>
            <option value="10">10</option>
            <option value="12">12</option>

            <option
                value="14"
                selected>

                14

            </option>

            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="24">24</option>
            <option value="28">28</option>
            <option value="32">32</option>
            <option value="48">48</option>
            <option value="72">72</option>

        </select>

    </div>

    <div class="group">

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'bold')">

            <b>B</b>

        </button>

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'italic')">

            <i>I</i>

        </button>

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'underline')">

            <u>U</u>

        </button>

    </div>

    <div class="group">

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'justifyLeft')">

            ⬅

        </button>

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'justifyCenter')">

            ↔

        </button>

        <button
            class="toggle-btn"
            onclick="toggleFormat(this,'justifyRight')">

            ➡

        </button>

    </div>

    <div class="group">

        <input
            type="color"
            id="textColor"
            onchange="changeColor()">

    </div>

    <div class="group">

        <button onclick="insertDate()">

            📅 Data

        </button>

    </div>

</section>

<main class="editor-container">

    <div id="pagesContainer">

        <div class="paper">

            <input
                id="documentTitle"
                class="document-title"
                placeholder="Documento sem título">

            <div
                class="editor"
                id="editor"
                contenteditable="true">

            </div>

        </div>

    </div>

</main>

<footer class="status-bar">

    <span id="wordCount">

        0 palavras

    </span>

    <span id="charCount">

        0 caracteres

    </span>

</footer>

<script src="js/write.js"></script>

</body>
</html>
