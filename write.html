<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retropixel Write™</title>

<link rel="icon" href="assets/icons/Write_icon.png">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/write.css">

</head>

<body>

<header class="write-top">

    <div class="write-logo">

        <img
            src="assets/icons/Write_icon.png"
            alt="Write">

        <div>

            <h1>Retropixel Write™</h1>

            <p>Editor de documentos</p>

        </div>

    </div>

    <button
        class="home-btn"
        onclick="location.href='index.html'">

        🏠 Início

    </button>

</header>

<section class="ribbon">

    <div class="group">

        <button onclick="newDocument()">
    📄 Novo
</button>

<button onclick="openDocument()">
    📂 Abrir
</button>

<button onclick="saveDocument()">
    💾 Salvar
</button>

<button onclick="addPage()">
    ➕ Página
</button>

<button onclick="deletePage()">
    🗑 Página
</button>

<input
    type="file"
    id="fileOpen"
    hidden
    accept=".txt,.html,.rpw"
>

    </div>

    <div class="group">

        <select
            id="fontName">

            <option value="Arial">
                Arial
            </option>

            <option value="Verdana">
                Verdana
            </option>

            <option value="Tahoma">
                Tahoma
            </option>

            <option value="Trebuchet MS">
                Trebuchet MS
            </option>

            <option value="Segoe UI">
                Segoe UI
            </option>

            <option value="Georgia">
                Georgia
            </option>

            <option value="Times New Roman">
                Times New Roman
            </option>

            <option value="Courier New">
                Courier New
            </option>

        </select>

        <select
            id="fontSize">

            <option>8</option>
            <option>10</option>
            <option>12</option>
            <option selected>14</option>
            <option>16</option>
            <option>18</option>
            <option>20</option>
            <option>24</option>
            <option>28</option>
            <option>32</option>
            <option>48</option>
            <option>72</option>

        </select>

    </div>

    <div class="group">

        <button
            id="boldBtn"
            class="toggle-btn">

            <b>B</b>

        </button>

        <button
            id="italicBtn"
            class="toggle-btn">

            <i>I</i>

        </button>

        <button
            id="underlineBtn"
            class="toggle-btn">

            <u>U</u>

        </button>

    </div>

    <div class="group">

        <button id="leftBtn">
            ⬅
        </button>

        <button id="centerBtn">
            ↔
        </button>

        <button id="rightBtn">
            ➡
        </button>

    </div>

    <div class="group">

        <input
            type="color"
            id="textColor">

    </div>

    <div class="group">

        <button onclick="insertDate()">
            📅 Data
        </button>

    </div>

</section>

<main class="editor-container">

    <div id="pagesContainer">

        <div class="paper">

            <input
                id="documentTitle"
                class="document-title"
                placeholder="Documento sem título">

            <div
                class="editor-page"
                contenteditable="true">

            </div>

        </div>

    </div>

</main>

<footer class="status-bar">

    <span id="wordCount">
        0 palavras
    </span>

    <span id="charCount">
        0 caracteres
    </span>

    <span id="pageCount">
        1 página
    </span>

</footer>

<script src="js/write.js"></script>

</body>
</html>
